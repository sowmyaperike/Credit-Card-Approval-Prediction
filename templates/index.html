<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Credit Card Approval Prediction</h1>

    <form action="/predict" method="POST">

        {% for col in [
        'CNT_CHILDREN',
        'AMT_INCOME_TOTAL',
        'CNT_FAM_MEMBERS',
        'AGE',
        'YEARS_EMPLOYED'
        ] %}

        <label>{{ col }}</label>

        <input
            type="number"
            step="any"
            name="{{ col }}"
            required>

        {% endfor %}

        <button type="submit">
            Predict
        </button>

    </form>

    {% if prediction %}
        <h2>{{ prediction }}</h2>
    {% endif %}

</div>

</body>
</html>
